<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security verification - Biubo WAF</title>
  <script src="https://captcha.zplb.org.cn/static/js/rti-captcha.js"></script>
  <style>
    :root {
      --primary-color: #00d2ff;
      --secondary-color: #3a7bd5;
      --bg-color: #0f172a;
      --text-color: #f8fafc;
      --card-bg: rgba(30, 41, 59, 0.7);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      background-image:
        radial-gradient(at 0% 0%, rgba(58,123,213,0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(0,210,255,0.15) 0px, transparent 50%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-color);
      overflow: hidden;
    }

    .container {
      text-align: center;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      padding: 3rem;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      max-width: 450px;
      width: 90%;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.5rem;
      letter-spacing: -0.025em;
    }

    h1 {
      font-size: 1.25rem;
      margin-bottom: 0.75rem;
      font-weight: 600;
    }

    p {
      color: #94a3b8;
      font-size: 0.875rem;
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }

    /* JS Challenge phase */
    #phase-js { display: block; }

    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      display: inline-block;
      position: relative;
      animation: rotation 1s linear infinite;
      margin-bottom: 1.5rem;
    }
    .loader::after {
      content: '';
      position: absolute;
      left: 0; top: 0;
      background: var(--primary-color);
      width: 12px; height: 12px;
      border-radius: 50%;
    }
    @keyframes rotation {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .status {
      font-size: 0.875rem;
      color: var(--primary-color);
      font-weight: 500;
      margin-top: 1rem;
    }

    /* Captcha phase */
    #phase-captcha { display: none; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      color: #475569;
      font-size: 0.75rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }

    .captcha-box {
      background: rgba(15,23,42,0.6);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 1.25rem;
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #ketchup-captcha { width: 100%; }

    .result {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      animation: fadeIn .3s ease;
    }
    .result.success {
      display: flex;
      background: rgba(0,210,150,0.1);
      border: 1px solid rgba(0,210,150,0.3);
      color: #00d296;
    }
    .result.error {
      display: flex;
      background: rgba(255,80,80,0.1);
      border: 1px solid rgba(255,80,80,0.3);
      color: #ff6060;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #475569;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">Biubo WAF</div>

  <div id="phase-js">
    <span class="loader"></span>
    <h1>安全驗證進行中</h1>
    <p>我們的系統偵測到你的請求可能不正常。為了保護你的帳戶安全，請稍候等後，系統將自動完成環境驗證。</p>
    <div class="status" id="js-status">正在驗證流覽器環境...</div>
  </div>

  <div id="phase-captcha">
    <h1>One more step</h1>
    <p>Automated check passed. Please complete the verification below to confirm you're a real user.</p>
    <div class="divider">Human verification</div>
    <div class="captcha-box">
      <div id="ketchup-captcha"></div>
    </div>
    <div class="result" id="result-box">
      <span id="result-icon"></span>
      <span id="result-msg"></span>
    </div>
  </div>

  <div class="footer">Request ID: {|<ri>|}</div>
</div>

<script>
  const jsStatus = document.getElementById('js-status');

  setTimeout(() => { jsStatus.innerText = 'Checking network fingerprint...'; }, 600);
  setTimeout(() => { jsStatus.innerText = 'Environment check passed, loading challenge...'; }, 1200);
  setTimeout(() => {
    document.getElementById('phase-js').style.display = 'none';
    document.getElementById('phase-captcha').style.display = 'block';

    RTICaptcha.render('ketchup-captcha', {
      onVerify: (ticket) => onVerified(ticket)
    });
  }, 1800);

  function onVerified(ticket) {
    redirect(ticket);
  }

  function redirect(ticket) {
    setTimeout(() => {
      // 取原始路径（pathname + 已有参数），追加 bw_captcha=<ticket>
      const url = new URL(window.location.href);
      url.searchParams.set('bw_captcha', ticket);
      window.location.href = url.pathname + '?' + url.searchParams.toString();
    }, 800);
  }
</script>
</body>
</html>
