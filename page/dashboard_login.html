<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biubo WAF Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  }
  .container {
    background: #121826;
    border: 1px solid #1e2a3d;
    border-radius: 12px;
    padding: 48px;
    width: 420px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }
  .header {
    text-align: center;
    margin-bottom: 40px;
  }
  .header h1 {
    color: #e2e8f0;
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .header p {
    color: #64748b;
    font-size: 14px;
  }
  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    color: #94a3b8;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .form-group input {
    width: 100%;
    padding: 12px 16px;
    background: #0f1623;
    border: 1px solid #1e2a3d;
    border-radius: 8px;
    color: #e2e8f0;
    font-size: 14px;
    outline: none;
    transition: all 0.2s;
  }
  .form-group input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
  }
  .form-group input::placeholder {
    color: #475569;
  }
  .hint {
    color: #64748b;
    font-size: 12px;
    margin-top: 6px;
  }
  .message {
    padding: 12px;
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
  }
  .message.error {
    background: rgba(239, 68, 68, 0.1);
    color: #ef4444;
    border: 1px solid rgba(239, 68, 68, 0.2);
    display: block;
  }
  .message.success {
    background: rgba(34, 197, 94, 0.1);
    color: #22c55e;
    border: 1px solid rgba(34, 197, 94, 0.2);
    display: block;
  }
  .btn {
    width: 100%;
    padding: 14px;
    background: #3b82f6;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover {
    background: #2563eb;
  }
  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .hidden {
    display: none !important;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Biubo WAF</h1>
    <p>Web Application Firewall</p>
  </div>

  <!-- Login Section -->
  <div id="login-section">
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" autofocus>
      <div class="hint">Default: biubo123456</div>
    </div>
    <div class="message" id="login-message"></div>
    <button class="btn" id="login-btn">Login</button>
  </div>

  <!-- Password Change Section -->
  <div id="password-section" class="hidden">
    <div class="form-group">
      <label for="old-password">Current Password</label>
      <input type="password" id="old-password" placeholder="Enter current password">
    </div>
    <div class="form-group">
      <label for="new-password">New Password</label>
      <input type="password" id="new-password" placeholder="At least 8 characters">
    </div>
    <div class="form-group">
      <label for="confirm-password">Confirm New Password</label>
      <input type="password" id="confirm-password" placeholder="Confirm new password">
    </div>
    <div class="message" id="password-message"></div>
    <button class="btn" id="change-password-btn">Change Password</button>
  </div>
</div>
<script>
const loginSection = document.getElementById('login-section');
const passwordSection = document.getElementById('password-section');
const loginMessage = document.getElementById('login-message');
const passwordMessage = document.getElementById('password-message');

function showMessage(element, text, type) {
  element.textContent = text;
  element.className = 'message ' + type;
}

function clearMessage(element) {
  element.textContent = '';
  element.className = 'message';
}

async function handleLogin() {
  const password = document.getElementById('password').value;
  const loginBtn = document.getElementById('login-btn');
  
  if (!password) {
    showMessage(loginMessage, 'Please enter password', 'error');
    return;
  }
  
  clearMessage(loginMessage);
  loginBtn.disabled = true;
  
  try {
    const response = await fetch('/biubo-cgi/dashboard/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    const data = await response.json();
    
    if (data.status === 'success') {
      if (data.force_password_change) {
        loginSection.classList.add('hidden');
        passwordSection.classList.remove('hidden');
        document.getElementById('old-password').value = password;
        document.getElementById('old-password').focus();
      } else {
        window.location.href = '/biubo-cgi/dashboard';
      }
    } else {
      showMessage(loginMessage, data.msg || 'Invalid password', 'error');
      loginBtn.disabled = false;
    }
  } catch (error) {
    showMessage(loginMessage, 'Network error, please try again', 'error');
    loginBtn.disabled = false;
  }
}

async function handleChangePassword() {
  const oldPassword = document.getElementById('old-password').value;
  const newPassword = document.getElementById('new-password').value;
  const confirmPassword = document.getElementById('confirm-password').value;
  const changeBtn = document.getElementById('change-password-btn');
  
  if (!oldPassword || !newPassword || !confirmPassword) {
    showMessage(passwordMessage, 'Please fill all fields', 'error');
    return;
  }
  
  if (newPassword !== confirmPassword) {
    showMessage(passwordMessage, 'Passwords do not match', 'error');
    return;
  }
  
  if (newPassword.length < 8) {
    showMessage(passwordMessage, 'Password must be at least 8 characters', 'error');
    return;
  }
  
  clearMessage(passwordMessage);
  changeBtn.disabled = true;
  
  try {
    const response = await fetch('/biubo-cgi/dashboard/api/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        old_password: oldPassword,
        new_password: newPassword,
        confirm_password: confirmPassword
      })
    });
    const data = await response.json();
    
    if (data.status === 'success') {
      showMessage(passwordMessage, 'Password changed successfully! Redirecting...', 'success');
      setTimeout(() => {
        window.location.href = '/biubo-cgi/dashboard';
      }, 1500);
    } else {
      showMessage(passwordMessage, data.msg || 'Failed to change password', 'error');
      changeBtn.disabled = false;
    }
  } catch (error) {
    showMessage(passwordMessage, 'Network error, please try again', 'error');
    changeBtn.disabled = false;
  }
}

document.getElementById('login-btn').addEventListener('click', handleLogin);
document.getElementById('password').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') handleLogin();
});

document.getElementById('change-password-btn').addEventListener('click', handleChangePassword);
document.getElementById('confirm-password').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') handleChangePassword();
});
</script>
</body>
</html>
