<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biubo WAF · 登录</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#020b18;--border:rgba(0,200,255,0.18);--accent:#00c8ff;--red:#ff3a3a;--text:#c8e8ff;--glow:0 0 18px rgba(0,200,255,0.35)}
  body{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;color:var(--text)}
  body::after{content:'';position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px)}
  .box{background:rgba(2,15,35,0.92);border:1px solid var(--border);border-radius:10px;padding:40px 44px;width:360px;position:relative;backdrop-filter:blur(16px)}
  .box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
  .logo-icon{width:36px;height:36px;border:1.5px solid var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;box-shadow:var(--glow);font-size:18px}
  h1{font-size:18px;font-weight:700;letter-spacing:3px;text-transform:uppercase}
  label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(200,232,255,0.5);margin-bottom:8px}
  input{width:100%;background:rgba(0,100,180,0.1);border:1px solid rgba(0,200,255,0.2);border-radius:5px;padding:11px 14px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:14px;outline:none;transition:border-color .2s}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,200,255,0.1)}
  .err{color:var(--red);font-size:12px;margin-top:8px;min-height:18px;font-family:'Share Tech Mono',monospace}
  button{margin-top:24px;width:100%;padding:12px;background:rgba(0,200,255,0.12);border:1px solid var(--accent);border-radius:5px;color:var(--accent);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
  button:hover{background:rgba(0,200,255,0.22);box-shadow:var(--glow)}
  button:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>
<div class="box">
  <div style="position:absolute;top:16px;right:16px">
    <select id="lang-sel" onchange="changeLang(this.value)" style="background:rgba(0,100,180,0.1);border:1px solid var(--border);color:var(--dim);padding:4px 8px;border-radius:4px;outline:none;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:12px;">
      <option value="zh-TW">繁體中文</option>
      <option value="zh">简体中文</option>
      <option value="en">English</option>
    </select>
  </div>
  <div class="logo">
    <div class="logo-icon">⬡</div>
    <h1 id="t-h1">Biubo WAF</h1>
  </div>
  <label id="t-label">管理员密码</label>
  <input type="password" id="pwd" placeholder="輸入密碼" autofocus onkeydown="if(event.key==='Enter')login()">
  <div class="err" id="err"></div>
  <button id="btn" onclick="login()">進入控制臺</button>
</div>
<script>
const I18N = {
  'zh-TW': {
    title: 'Biubo WAF · 登入',
    adminPwd: '管理員密碼',
    pwdPlaceholder: '輸入密碼',
    btnEnter: '進入控制檯',
    errEmpty: '請輸入密碼',
    errWrong: '密碼不正確',
    errNet: '網路錯誤，請重試'
  },
  'zh': {
    title: 'Biubo WAF · 登录',
    adminPwd: '管理员密码',
    pwdPlaceholder: '输入密码',
    btnEnter: '进入控制台',
    errEmpty: '请输入密码',
    errWrong: '密码错误',
    errNet: '网络错误，请重试'
  },
  en: {
    title: 'Biubo WAF · Login',
    adminPwd: 'Admin Password',
    pwdPlaceholder: 'Enter password',
    btnEnter: 'Enter Console',
    errEmpty: 'Please enter password',
    errWrong: 'Invalid password',
    errNet: 'Network error, please try again'
  }
};
let curLang = localStorage.getItem('biubo_lang') || 'zh-TW';
if (curLang !== 'zh-TW' && curLang !== 'zh' && curLang !== 'en') curLang = 'zh-TW';

function changeLang(lang) {
  curLang = lang;
  localStorage.setItem('biubo_lang', lang);
  applyLang();
}

function applyLang() {
  document.getElementById('lang-sel').value = curLang;
  const t = I18N[curLang];
  document.title = t.title;
  document.getElementById('t-label').textContent = t.adminPwd;
  document.getElementById('pwd').placeholder = t.pwdPlaceholder;
  document.getElementById('btn').textContent = t.btnEnter;
  
  const errEl = document.getElementById('err');
  if (errEl.dataset.errId) errEl.textContent = t[errEl.dataset.errId];
}
applyLang();

async function login() {
  const pwd = document.getElementById('pwd').value;
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  const t = I18N[curLang];
  if (!pwd) { err.textContent = t.errEmpty; err.dataset.errId = 'errEmpty'; return; }
  btn.disabled = true;
  err.textContent = '';
  err.dataset.errId = '';
  try {
    const r = await fetch('/biubo-cgi/dashboard/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password: pwd})
    });
    const d = await r.json();
    if (d.status === 'success') {
      window.location.href = '/biubo-cgi/dashboard';
    } else {
      err.textContent = curLang === 'zh' && d.msg ? d.msg : t.errWrong;
      err.dataset.errId = 'errWrong';
      btn.disabled = false;
    }
  } catch(e) {
    err.textContent = t.errNet;
    err.dataset.errId = 'errNet';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
