<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biubo WAF · 登录</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#020b18;--border:rgba(0,200,255,0.18);--accent:#00c8ff;--red:#ff3a3a;--text:#c8e8ff;--glow:0 0 18px rgba(0,200,255,0.35)}
  body{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;color:var(--text)}
  body::after{content:'';position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px)}
  .box{background:rgba(2,15,35,0.92);border:1px solid var(--border);border-radius:10px;padding:40px 44px;width:400px;position:relative;backdrop-filter:blur(16px)}
  .box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
  .logo-icon{width:36px;height:36px;border:1.5px solid var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;box-shadow:var(--glow);font-size:18px}
  h1{font-size:18px;font-weight:700;letter-spacing:3px;text-transform:uppercase}
  label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(200,232,255,0.5);margin-bottom:8px}
  input{width:100%;background:rgba(0,100,180,0.1);border:1px solid rgba(0,200,255,0.2);border-radius:5px;padding:11px 14px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:14px;outline:none;transition:border-color .2s;margin-bottom:8px}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,200,255,0.1)}
  .err{color:var(--red);font-size:12px;margin-top:8px;min-height:18px;font-family:'Share Tech Mono',monospace}
  .success{color:#00ff88;font-size:12px;margin-top:8px;min-height:18px;font-family:'Share Tech Mono',monospace}
  button{margin-top:16px;width:100%;padding:12px;background:rgba(0,200,255,0.12);border:1px solid var(--accent);border-radius:5px;color:var(--accent);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
  button:hover{background:rgba(0,200,255,0.22);box-shadow:var(--glow)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .hidden{display:none}
  .hint{font-size:11px;color:rgba(200,232,255,0.4);margin-bottom:8px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-icon">⬡</div>
    <h1>Biubo WAF</h1>
  </div>

  <!-- Login Form -->
  <div id="login-form">
    <label>管理員密碼</label>
    <input type="password" id="pwd" placeholder="預設密碼: biubo123456" autofocus>
    <div class="hint">首次登入後請立即修改密碼</div>
    <div class="err" id="err"></div>
    <button id="btn-login">進入控制臺</button>
  </div>

  <!-- Change Password Form (hidden by default) -->
  <div id="change-pwd-form" class="hidden">
    <label>舊密碼</label>
    <input type="password" id="old-pwd" placeholder="輸入舊密碼">
    <label>新密碼</label>
    <input type="password" id="new-pwd" placeholder="至少 8 位">
    <label>確認新密碼</label>
    <input type="password" id="confirm-pwd" placeholder="再次輸入新密碼">
    <div class="err" id="pwd-err"></div>
    <div class="success" id="pwd-success"></div>
    <button id="btn-change">修改密碼</button>
  </div>
</div>
<script>
async function login() {
  const pwd = document.getElementById('pwd').value;
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('err');
  
  if (!pwd) { err.textContent = '請輸入密碼'; return; }
  btn.disabled = true;
  err.textContent = '';
  
  try {
    const r = await fetch('/biubo-cgi/dashboard/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({password: pwd})
    });
    const d = await r.json();
    
    if (d.status === 'success') {
      if (d.force_password_change) {
        // Show password change form
        document.getElementById('login-form').classList.add('hidden');
        document.getElementById('change-pwd-form').classList.remove('hidden');
        document.getElementById('old-pwd').value = pwd;
        document.getElementById('old-pwd').focus();
      } else {
        window.location.href = '/biubo-cgi/dashboard';
      }
    } else {
      err.textContent = d.msg || '密碼不正確';
      btn.disabled = false;
    }
  } catch(e) {
    err.textContent = '網路錯誤';
    btn.disabled = false;
  }
}

async function changePassword() {
  const oldPwd = document.getElementById('old-pwd').value;
  const newPwd = document.getElementById('new-pwd').value;
  const confirmPwd = document.getElementById('confirm-pwd').value;
  const btn = document.getElementById('btn-change');
  const err = document.getElementById('pwd-err');
  const success = document.getElementById('pwd-success');
  
  if (!oldPwd || !newPwd) {
    err.textContent = '請輸入所有必填字段';
    return;
  }
  if (newPwd !== confirmPwd) {
    err.textContent = '新密碼不符';
    return;
  }
  if (newPwd.length < 8) {
    err.textContent = '密碼長度至少 8 位';
    return;
  }
  
  btn.disabled = true;
  err.textContent = '';
  success.textContent = '';
  
  try {
    const r = await fetch('/biubo-cgi/dashboard/api/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        old_password: oldPwd,
        new_password: newPwd,
        confirm_password: confirmPwd
      })
    });
    const d = await r.json();
    
    if (d.status === 'success') {
      success.textContent = '密碼已成功更改，正在跳轉...';
      setTimeout(() => {
        window.location.href = '/biubo-cgi/dashboard';
      }, 1000);
    } else {
      err.textContent = d.msg || '密碼更改失敗';
      btn.disabled = false;
    }
  } catch(e) {
    err.textContent = '網路錯誤';
    btn.disabled = false;
  }
}

document.getElementById('btn-login').addEventListener('click', login);
document.getElementById('pwd').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') login();
});
document.getElementById('btn-change').addEventListener('click', changePassword);
document.getElementById('confirm-pwd').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') changePassword();
});
</script>
</body>
</html>
