<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biubo WAF Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  }
  .container {
    background: #121826;
    border: 1px solid #1e2a3d;
    border-radius: 12px;
    padding: 48px;
    width: 420px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }
  .header {
    text-align: center;
    margin-bottom: 40px;
  }
  .header h1 {
    color: #e2e8f0;
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .header p {
    color: #64748b;
    font-size: 14px;
  }
  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    color: #94a3b8;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .form-group input {
    width: 100%;
    padding: 12px 16px;
    background: #0f1623;
    border: 1px solid #1e2a3d;
    border-radius: 8px;
    color: #e2e8f0;
    font-size: 14px;
    outline: none;
    transition: all 0.2s;
  }
  .form-group input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
  }
  .form-group input::placeholder {
    color: #475569;
  }
  .hint {
    color: #64748b;
    font-size: 12px;
    margin-top: 6px;
  }
  .message {
    padding: 12px;
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
  }
  .message.error {
    background: rgba(239, 68, 68, 0.1);
    color: #ef4444;
    border: 1px solid rgba(239, 68, 68, 0.2);
    display: block;
  }
  .message.success {
    background: rgba(34, 197, 94, 0.1);
    color: #22c55e;
    border: 1px solid rgba(34, 197, 94, 0.2);
    display: block;
  }
  .btn {
    width: 100%;
    padding: 14px;
    background: #3b82f6;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover {
    background: #2563eb;
  }
  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .hidden {
    display: none !important;
  }
  .adblock-warning {
    color: #ff6b6b;
    font-size: 12px;
    margin-top: 5px;
    animation: blink 2s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Biubo WAF</h1>
    <p>Web Application Firewall</p>
    <div class="adblock-warning">⚠️ 如果無法登入，請先關閉廣告攔截器</div>
  </div>

  <!-- Login Section -->
  <div id="login-section">
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" autofocus>
      <div class="hint">Default: biubo123456</div>
    </div>
    <div class="message" id="login-message"></div>
    <button class="btn" id="login-btn">Login</button>
  </div>

  <!-- Password Change Section -->
  <div id="password-section" class="hidden">
    <div class="form-group">
      <label for="old-password">Current Password</label>
      <input type="password" id="old-password" placeholder="Enter current password">
    </div>
    <div class="form-group">
      <label for="new-password">New Password</label>
      <input type="password" id="new-password" placeholder="At least 8 characters">
    </div>
    <div class="form-group">
      <label for="confirm-password">Confirm New Password</label>
      <input type="password" id="confirm-password" placeholder="Confirm new password">
    </div>
    <div class="message" id="password-message"></div>
    <button class="btn" id="change-password-btn">Change Password</button>
  </div>
  </div>
<script src="/biubo-cgi/dashboard_login.js"></script>
</body>
</html>
